# Fly.io configuration for the Salary Management backend.
# Replace `app` with the actual application name created via `fly launch`.

app = "salary-management"
primary_region = "bom"

[build]

[env]
  ALLOWED_ORIGINS = "https://salary-management.vercel.app"
  DATABASE_URL = "sqlite:////data/app.db"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/"

[[mounts]]
  source = "salary_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
